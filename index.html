<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Converter Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#240046,#3c096c,#10002b);
    color:white;
    overflow-x:hidden;
    position:relative;
    min-height:250vh;
}

/* Floating Calculator */

.floating-calculator{
    position:fixed;
    top:20px;
    right:20px;
    width:75px;
    height:75px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:
        0 0 20px rgba(0,212,255,.5),
        0 0 40px rgba(162,155,254,.4);
    animation:
        calculatorFloat 3s ease-in-out infinite,
        glow 2s ease-in-out infinite alternate;
    z-index:1000;
}

@keyframes calculatorFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
}

@keyframes glow{
    from{
        box-shadow:
            0 0 20px rgba(0,212,255,.5),
            0 0 40px rgba(162,155,254,.4);
    }
    to{
        box-shadow:
            0 0 35px rgba(0,212,255,.9),
            0 0 70px rgba(162,155,254,.8);
    }
}

/* Floating Symbols */

.symbol{
    position:absolute;
    color:rgba(255,255,255,0.08);
    font-size:42px;
    font-weight:700;
    pointer-events:none;
    user-select:none;
    animation:float 8s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-20px);}
}

.container{
    width:92%;
    max-width:900px;
    margin:auto;
    padding:50px 0;
    position:relative;
    z-index:2;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:4rem;
    background:linear-gradient(90deg,#ffffff,#a29bfe,#00d4ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.title p{
    color:#dddddd;
    font-size:1.2rem;
}

.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:35px;
    padding:35px;
    margin-bottom:30px;
}

label{
    display:block;
    margin:15px 0 8px;
    font-weight:600;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:18px;
    outline:none;
}

input::placeholder{
    color:#cccccc;
}

button{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:22px;
    color:white;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
}

.blue{
    background:linear-gradient(90deg,#4f46e5,#c026d3);
}

.green{
    background:linear-gradient(90deg,#00c896,#00d4ff);
}

.result{
    margin-top:20px;
    padding:25px;
    border:2px dashed rgba(255,255,255,.3);
    border-radius:20px;
    text-align:center;
    font-size:2rem;
    font-weight:700;
}

@media(max-width:768px){
    .title h1{
        font-size:2.7rem;
    }
}

</style>
</head>

<body>

<div class="floating-calculator">🧮</div>

<!-- Floating Symbols -->
<div class="symbol" style="top:5%;left:5%">½</div>
<div class="symbol" style="top:10%;right:8%">x²</div>
<div class="symbol" style="top:15%;left:8%">√9</div>
<div class="symbol" style="top:20%;right:10%">¾</div>
<div class="symbol" style="top:25%;left:6%">π</div>
<div class="symbol" style="top:30%;right:8%">∑</div>
<div class="symbol" style="top:35%;left:7%">∞</div>
<div class="symbol" style="top:40%;right:9%">Δ</div>
<div class="symbol" style="top:45%;left:5%">7/3</div>
<div class="symbol" style="top:50%;right:10%">θ</div>
<div class="symbol" style="top:55%;left:8%">√16</div>
<div class="symbol" style="top:60%;right:6%">πr²</div>
<div class="symbol" style="top:65%;left:6%">x³</div>
<div class="symbol" style="top:70%;right:8%">a²+b²</div>
<div class="symbol" style="top:75%;left:8%">Σ</div>
<div class="symbol" style="top:80%;right:10%">1/3</div>
<div class="symbol" style="top:85%;left:6%">√25</div>
<div class="symbol" style="top:90%;right:7%">α</div>
<div class="symbol" style="top:95%;left:8%">β</div>
<div class="symbol" style="top:100%;right:9%">γ</div>

<div class="container">

<div class="title">
    <h1>Fraction Converter</h1>
    <p>Convert fractions instantly and accurately</p>
</div>

<div class="card">
    <h2>Improper Fraction → Mixed Fraction</h2>

    <label>Numerator</label>
    <input id="num1" type="number" placeholder="Enter numerator">

    <label>Denominator</label>
    <input id="den1" type="number" placeholder="Enter denominator">

    <button class="blue" onclick="mixed()">
        Convert to Mixed Fraction
    </button>

    <div class="result" id="mixedResult">---</div>
</div>

<div class="card">
    <h2>Mixed Fraction → Improper Fraction</h2>

    <label>Whole Number</label>
    <input id="whole" type="number" placeholder="Enter whole number">

    <label>Numerator</label>
    <input id="num2" type="number" placeholder="Enter numerator">

    <label>Denominator</label>
    <input id="den2" type="number" placeholder="Enter denominator">

    <button class="green" onclick="improper()">
        Convert to Improper Fraction
    </button>

    <div class="result" id="improperResult">---</div>
</div>

</div>

<script>

function mixed(){
    let n=parseInt(document.getElementById("num1").value);
    let d=parseInt(document.getElementById("den1").value);

    if(isNaN(n)||isNaN(d)||d===0){
        document.getElementById("mixedResult").innerHTML="Enter valid values";
        return;
    }

    let whole=Math.floor(n/d);
    let rem=n%d;

    if(rem===0)
        document.getElementById("mixedResult").innerHTML=whole;
    else if(whole===0)
        document.getElementById("mixedResult").innerHTML=`${rem}/${d}`;
    else
        document.getElementById("mixedResult").innerHTML=`${whole} ${rem}/${d}`;
}

function improper(){
    let w=parseInt(document.getElementById("whole").value);
    let n=parseInt(document.getElementById("num2").value);
    let d=parseInt(document.getElementById("den2").value);

    if(isNaN(w)||isNaN(n)||isNaN(d)||d===0){
        document.getElementById("improperResult").innerHTML="Enter valid values";
        return;
    }

    document.getElementById("improperResult").innerHTML=
        `${w*d+n}/${d}`;
}

</script>

</body>
                                                </html>
