<!DOCTYPE html>
<html>
<head>
    <title>Fraction Converter</title>
</head>
<body>
    <h1>Fraction Converter</h1>

    <h2>Improper Fraction → Mixed Fraction</h2>
    Numerator: <input type="number" id="num"><br><br>
    Denominator: <input type="number" id="den"><br><br>
    <button onclick="toMixed()">Convert</button>
    <p id="mixedResult"></p>

    <h2>Mixed Fraction → Improper Fraction</h2>
    Whole Number: <input type="number" id="whole"><br><br>
    Numerator: <input type="number" id="mnum"><br><br>
    Denominator: <input type="number" id="mden"><br><br>
    <button onclick="toImproper()">Convert</button>
    <p id="improperResult"></p>

    <script>
        function toMixed() {
            let num = parseInt(document.getElementById("num").value);
            let den = parseInt(document.getElementById("den").value);

            let whole = Math.floor(num / den);
            let remainder = num % den;

            document.getElementById("mixedResult").innerText =
                whole + " " + remainder + "/" + den;
        }

        function toImproper() {
            let whole = parseInt(document.getElementById("whole").value);
            let num = parseInt(document.getElementById("mnum").value);
            let den = parseInt(document.getElementById("mden").value);

            let improperNum = whole * den + num;

            document.getElementById("improperResult").innerText =
                improperNum + "/" + den;
        }
    </script>
</body>
  </html>
